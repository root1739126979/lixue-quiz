services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: lixue
      POSTGRES_USER: lixue
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  server:
    build: ./server
    env_file: .env
    depends_on:
      - db
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  web:
    build: ./web
    depends_on:
      - server
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped

volumes:
  postgres_data:
